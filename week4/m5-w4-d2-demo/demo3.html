<!DOCTYPE html>
<html>
  <head>
    <title>O(n!) - Factorial</title>
  </head>
  <body>
    <script>
      function factorial(n) {
        let result = 1;
        for (let i = 1; i <= n; i++) {
          result *= i;
        }
        return result;
      }

      console.log(factorial(1));
      console.log(factorial(10));
      console.log(factorial(12));
    </script>
  </body>
</html>
