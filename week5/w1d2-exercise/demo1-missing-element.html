<!DOCTYPE html>
<html>
<head><title>Demo 1 - Missing Element</title></head>
<body>
<script>
//Array
let arr = [1, 2, 3, 5];

function getMissingNo(arr) {
  let n = arr.length + 1;
  let expectedSum = (n * (n + 1)) / 2;
  let actualSum = arr.reduce((acc, val) => acc + val, 0);
  return expectedSum - actualSum;
}

//Driver Program
document.write(getMissingNo(arr));
</script>
</body>
</html>
