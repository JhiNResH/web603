<!DOCTYPE html>
<html>
<head>
<title>Demo 6 - Image Transform</title>
<style>
#div1 {
  perspective: 300px;
}

#div2 {
  padding: 50px;
  border: 1px solid black;
  background-color: yellow;
  transform: rotateX(45deg);
}

#div3 {
  padding: 20px;
  border: 1px solid black;
  background-color: lightblue;
  transform: rotateY(45deg);
}
</style>
</head>
<body>
<div id="div1">
  <div id="div2">HELLO
    <div id="div3">YELLOW</div>
  </div>
</div>
</body>
</html>
